<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Sphere</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root {
      --primary: #00d4ff;
      --bg: #0a0a0f;
      --accent: #7b00ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #1a0033 100%);
      color: #e0e0ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .forgot-container {
      display: flex;
      width: 95%;
      max-width: 1080px;
      background: rgba(18, 18, 26, 0.95);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 25px 80px rgba(0, 212, 255, 0.2);
      backdrop-filter: blur(15px);
    }

    /* Left Side */
    .left-side {
      flex: 1;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      padding: 80px 60px;
      color: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo {
      font-size: 58px;
      font-weight: 900;
      margin-bottom: 30px;
      letter-spacing: -2px;
    }

    .left-side h1 {
      font-size: 42px;
      line-height: 1.1;
      margin-bottom: 25px;
    }

    .left-side p {
      font-size: 19px;
      opacity: 0.9;
      max-width: 320px;
    }

    /* Right Side */
    .right-side {
      flex: 1;
      padding: 80px 70px;
      display: flex;
      flex-direction: column;
    }

    .form-wrapper {
      max-width: 380px;
      width: 100%;
      margin: 0 auto;
    }

    h2 {
      font-size: 32px;
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #a0a0cc;
      margin-bottom: 35px;
      line-height: 1.5;
    }

    .input-group {
      margin-bottom: 25px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14.5px;
      color: #bbb;
    }

    .input-field {
      width: 100%;
      padding: 16px 20px;
      background: #1f1f2e;
      border: 2px solid #333;
      border-radius: 14px;
      color: white;
      font-size: 16.5px;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn-reset {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      color: black;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      margin: 10px 0 20px;
    }

    .btn-reset:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(0, 212, 255, 0.4);
    }

    .back-link {
      text-align: center;
      font-size: 15.5px;
    }

    .back-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .info-box {
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 12px;
      padding: 15px;
      font-size: 14.5px;
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="forgot-container">

    <!-- Left Side -->
    <div class="left-side">
      <div class="logo">Sphere</div>
      <h1>Reset Your<br>Password</h1>
      <p>No worries! We'll help you get back into your account.</p>
    </div>

    <!-- Right Side -->
    <div class="right-side">
      <div class="form-wrapper">
        <h2>Forgot Password?</h2>
        <p class="subtitle">
          Enter your email address and we'll send you a link to reset your password.
        </p>

        <div class="input-group">
          <label>Email Address</label>
          <input type="email" id="email" class="input-field" 
                 placeholder="puskal@example.com" value="puskal@example.com">
        </div>

        <button class="btn-reset" onclick="sendResetLink()">Send Reset Link</button>

        <div class="back-link">
          Remember your password? 
          <a href="login.html">Back to Login</a>
        </div>

        <div class="info-box">
          📧 Check your spam/junk folder if you don't see the email in a few minutes.
        </div>
      </div>
    </div>
  </div>

  <script>
    function sendResetLink() {
      const email = document.getElementById('email').value.trim();

      if (!email) {
        alert("Please enter your email address");
        return;
      }

      // Simulate sending email
      const btn = event.currentTarget;
      const originalText = btn.textContent;

      btn.textContent = "Sending...";
      btn.disabled = true;

      setTimeout(() => {
        alert(`✅ Reset link sent successfully!\n\nWe have sent a password reset link to:\n${email}\n\nPlease check your inbox.`);

        // Redirect back to login after success
        setTimeout(() => {
          window.location.href = "login.html";
        }, 1500);
      }, 1800);
    }

    // Allow pressing Enter key
    document.addEventListener("keypress", function(e) {
      if (e.key === "Enter") sendResetLink();
    });
  </script>
</body>
</html>
