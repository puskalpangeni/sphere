<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messenger - Sphere</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root {
      --primary: #00d4ff;
      --bg: #0a0a0f;
      --sidebar: #12121a;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: #e0e0ff;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }

    /* Sidebar - Friends List */
    .friends-sidebar {
      width: 340px;
      background: var(--sidebar);
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 20px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 28px;
      font-weight: 900;
      background: linear-gradient(90deg, #00d4ff, #7b00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .search {
      margin: 15px 20px;
      padding: 12px 16px;
      background: #1f1f2e;
      border-radius: 30px;
      border: none;
      color: white;
      width: calc(100% - 40px);
    }

    .friends-list {
      flex: 1;
      overflow-y: auto;
    }

    .friend-item {
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: 0.3s;
    }

    .friend-item:hover { background: rgba(0,212,255,0.15); }

    .friend-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--primary);
    }

    .friend-info { flex: 1; }
    .friend-name { font-weight: 600; font-size: 16.5px; }
    .friend-status { font-size: 13.5px; color: #00ff88; }

    /* Chat Area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #0f0f17;
    }

    .chat-header {
      padding: 16px 25px;
      background: rgba(18,18,26,0.95);
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-user {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .chat-user img {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid var(--primary);
    }

    .call-buttons {
      display: flex;
      gap: 12px;
    }

    .call-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
      transition: 0.3s;
    }

    .voice-call { background: #00ff88; color: black; }
    .video-call { background: #ff2d55; color: white; }

    .call-btn:hover { transform: scale(1.15); }

    .messages {
      flex: 1;
      padding: 25px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      max-width: 65%;
      padding: 13px 18px;
      border-radius: 18px;
      line-height: 1.5;
    }

    .message.sent {
      align-self: flex-end;
      background: #00d4ff;
      color: black;
    }

    .message.received {
      align-self: flex-start;
      background: #1f1f2e;
    }

    .message-input-area {
      padding: 20px;
      background: rgba(18,18,26,0.95);
      border-top: 1px solid #222;
    }

    .input-box {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1f1f2e;
      border-radius: 30px;
      padding: 12px 20px;
    }

    .input-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-size: 16px;
      outline: none;
    }

    .send-btn {
      width: 48px;
      height: 48px;
      background: var(--primary);
      color: black;
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
    }

    /* ==================== FIXED VIDEO CALL UI ==================== */
    .video-call-modal {
      position: fixed;
      inset: 0;
      background: #000;
      display: none;
      flex-direction: column;
      z-index: 3000;
    }

    .video-call-header {
      padding: 12px 20px;
      background: rgba(0,0,0,0.8);
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
      font-size: 18px;
    }

    .video-grid {
      flex: 1;
      display: flex;
      position: relative;
      background: #111;
    }

    .main-video {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .main-video video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .local-video-container {
      position: absolute;
      bottom: 25px;
      right: 25px;
      width: 220px;
      height: 160px;
      border: 4px solid var(--primary);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
      background: #000;
    }

    .local-video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-controls {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      padding: 12px 30px;
      border-radius: 50px;
      display: flex;
      gap: 25px;
    }

    .control-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .control-btn:hover { background: rgba(255,255,255,0.2); }
    .end-call-btn {
      background: #ff2d55 !important;
    }
  </style>
</head>
<body>

  <!-- Friends Sidebar -->
  <div class="friends-sidebar">
    <div class="header">
      <div class="logo">Sphere</div>
    </div>
    <input type="text" class="search" placeholder="Search friends..." id="searchInput">

    <div class="friends-list" id="friendsList"></div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area">
    <div class="chat-header">
      <div class="chat-user" id="chatHeader"></div>
      <div class="call-buttons">
        <div class="call-btn voice-call" onclick="startVoiceCall()"><i class="fas fa-phone"></i></div>
        <div class="call-btn video-call" onclick="startVideoCall()"><i class="fas fa-video"></i></div>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="message-input-area">
      <div class="input-box">
        <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <div class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></div>
      </div>
    </div>
  </div>

  <!-- Voice Call Modal (Simple) -->
  <div id="voiceCallModal" style="position:fixed; inset:0; background:rgba(0,0,0,0.97); display:none; align-items:center; justify-content:center; z-index:3000;">
    <div style="text-align:center;">
      <img id="voiceAvatar" style="width:180px;height:180px;border-radius:50%;border:6px solid #00d4ff;margin-bottom:20px;" src="">
      <div id="voiceName" style="font-size:28px;font-weight:700;margin-bottom:8px;"></div>
      <div id="voiceStatus" style="color:#aaa;font-size:19px;margin-bottom:60px;">Ringing...</div>
      <button onclick="endVoiceCall()" style="background:#ff2d55;color:white;border:none;width:80px;height:80px;border-radius:50%;font-size:32px;cursor:pointer;">
        <i class="fas fa-phone-slash"></i>
      </button>
    </div>
  </div>

  <!-- FIXED VIDEO CALL MODAL -->
  <div id="videoCallModal" class="video-call-modal">
    <div class="video-call-header">
      <span id="videoCallName"></span>
      <button onclick="endVideoCall()" style="background:#ff2d55; border:none; padding:10px 22px; border-radius:30px; color:white; cursor:pointer;">End Call</button>
    </div>

    <div class="video-grid">
      <div class="main-video">
        <video id="remoteVideo" autoplay playsinline></video>
      </div>

      <div class="local-video-container">
        <video id="localVideo" autoplay playsinline muted></video>
      </div>
    </div>

    <div class="video-controls">
      <div class="control-btn" onclick="toggleMute()"><i class="fas fa-microphone" id="micIcon"></i></div>
      <div class="control-btn" onclick="toggleCamera()"><i class="fas fa-video" id="camIcon"></i></div>
      <div class="control-btn end-call-btn" onclick="endVideoCall()">
        <i class="fas fa-phone-slash"></i>
      </div>
    </div>
  </div>

  <script>
    const friends = [
      { id: 1, name: "Sarah Chen", avatar: "https://i.pravatar.cc/150?img=65" },
      { id: 2, name: "Aarav Shrestha", avatar: "https://i.pravatar.cc/150?img=12" },
      { id: 3, name: "Neha Gurung", avatar: "https://i.pravatar.cc/150?img=64" },
      { id: 4, name: "Rohan KC", avatar: "https://i.pravatar.cc/150?img=47" }
    ];

    let currentFriend = friends[0];
    let localStream = null;
    let isMuted = false;
    let isCameraOff = false;

    function renderFriendsList() {
      const container = document.getElementById('friendsList');
      container.innerHTML = '';
      friends.forEach(friend => {
        const div = document.createElement('div');
        div.className = 'friend-item';
        div.innerHTML = `
          <img src="${friend.avatar}" class="friend-avatar">
          <div class="friend-info">
            <div class="friend-name">${friend.name}</div>
            <div class="friend-status">Active now</div>
          </div>
        `;
        div.onclick = () => openChat(friend);
        container.appendChild(div);
      });
    }

    function openChat(friend) {
      currentFriend = friend;
      document.getElementById('chatHeader').innerHTML = `
        <div class="chat-user">
          <img src="${friend.avatar}">
          <div>
            <strong>${friend.name}</strong><br>
            <small style="color:#00ff88;">Active now</small>
          </div>
        </div>
      `;

      document.getElementById('messages').innerHTML = `
        <div class="message received">Hi Puskal! How are you?</div>
        <div class="message sent">Doing well! You?</div>
      `;
    }

    function sendMessage() {
      const input = document.getElementById('messageInput');
      if (!input.value.trim()) return;
      const msg = document.createElement('div');
      msg.className = 'message sent';
      msg.textContent = input.value;
      document.getElementById('messages').appendChild(msg);
      document.getElementById('messages').scrollTop = 9999;
      input.value = '';
    }

    // Voice Call
    function startVoiceCall() {
      const modal = document.getElementById('voiceCallModal');
      document.getElementById('voiceAvatar').src = currentFriend.avatar;
      document.getElementById('voiceName').textContent = currentFriend.name;
      modal.style.display = 'flex';

      setTimeout(() => {
        if (modal.style.display === 'flex') {
          document.getElementById('voiceStatus').innerHTML = `Connected <span style="color:#00ff88;">●</span>`;
        }
      }, 2000);
    }

    function endVoiceCall() {
      document.getElementById('voiceCallModal').style.display = 'none';
    }

    // ==================== FIXED VIDEO CALL ====================
    async function startVideoCall() {
      const modal = document.getElementById('videoCallModal');
      document.getElementById('videoCallName').textContent = `In call with ${currentFriend.name}`;
      modal.style.display = 'flex';

      try {
        localStream = await navigator.mediaDevices.getUserMedia({ 
          video: true, 
          audio: true 
        });

        const localVideo = document.getElementById('localVideo');
        localVideo.srcObject = localStream;
        localVideo.play();

        // For demo: show local video as "remote" too (since we can't do real peer connection here)
        const remoteVideo = document.getElementById('remoteVideo');
        remoteVideo.srcObject = localStream;
        remoteVideo.play();

      } catch (err) {
        console.error(err);
        alert("Could not access camera/microphone. Please allow permission.");
        modal.style.display = 'none';
      }
    }

    function endVideoCall() {
      const modal = document.getElementById('videoCallModal');
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
      }
      modal.style.display = 'none';
    }

    function toggleMute() {
      if (!localStream) return;
      isMuted = !isMuted;
      localStream.getAudioTracks()[0].enabled = !isMuted;
      document.getElementById('micIcon').className = isMuted ? "fas fa-microphone-slash" : "fas fa-microphone";
    }

    function toggleCamera() {
      if (!localStream) return;
      isCameraOff = !isCameraOff;
      localStream.getVideoTracks()[0].enabled = !isCameraOff;
      document.getElementById('camIcon').className = isCameraOff ? "fas fa-video-slash" : "fas fa-video";
    }

    // Initialize
    window.onload = () => {
      renderFriendsList();
      openChat(friends[0]);
    };
  </script>
</body>
</html>
