<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Sphere</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root {
      --primary: #00d4ff;
      --bg: #0a0a0f;
      --accent: #7b00ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0a0f 0%, #1a0033 100%);
      color: #e0e0ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .signup-container {
      display: flex;
      width: 95%;
      max-width: 1080px;
      background: rgba(18, 18, 26, 0.95);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 25px 80px rgba(0, 212, 255, 0.2);
      backdrop-filter: blur(15px);
    }

    /* Left Side */
    .left-side {
      flex: 1;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      padding: 80px 60px;
      color: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .logo {
      font-size: 58px;
      font-weight: 900;
      margin-bottom: 30px;
      letter-spacing: -2px;
    }

    .left-side h1 {
      font-size: 44px;
      line-height: 1.1;
      margin-bottom: 25px;
    }

    .left-side p {
      font-size: 19px;
      opacity: 0.95;
    }

    /* Right Side */
    .right-side {
      flex: 1;
      padding: 70px 70px;
      display: flex;
      flex-direction: column;
    }

    .form-wrapper {
      max-width: 380px;
      width: 100%;
      margin: 0 auto;
    }

    h2 {
      font-size: 32px;
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #a0a0cc;
      margin-bottom: 35px;
      font-size: 16px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14.5px;
      color: #bbb;
    }

    .input-field {
      width: 100%;
      padding: 16px 20px;
      background: #1f1f2e;
      border: 2px solid #333;
      border-radius: 14px;
      color: white;
      font-size: 16.5px;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--primary);
    }

    .name-row {
      display: flex;
      gap: 15px;
    }

    .name-row .input-group {
      flex: 1;
    }

    .btn-create {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      color: black;
      font-size: 18px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      margin: 15px 0 10px;
    }

    .btn-create:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 30px rgba(0, 212, 255, 0.4);
    }

    .login-link {
      text-align: center;
      margin-top: 25px;
      font-size: 15.5px;
    }

    .login-link a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="signup-container">

    <!-- Left Side -->
    <div class="left-side">
      <div class="logo">Sphere</div>
      <h1>Join the<br>Community</h1>
      <p>Create your account and start connecting with the world around you.</p>
    </div>

    <!-- Right Side - Signup Form -->
    <div class="right-side">
      <div class="form-wrapper">
        <h2>Create Account</h2>
        <p class="subtitle">It's free and takes only a minute</p>

        <div class="name-row">
          <div class="input-group">
            <label>First Name</label>
            <input type="text" id="firstName" class="input-field" placeholder="Puskal" value="Puskal">
          </div>
          <div class="input-group">
            <label>Last Name</label>
            <input type="text" id="lastName" class="input-field" placeholder="Shrestha" value="Shrestha">
          </div>
        </div>

        <div class="input-group">
          <label>Email Address</label>
          <input type="email" id="email" class="input-field" placeholder="puskal@example.com" value="puskal@example.com">
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" class="input-field" placeholder="Create a strong password" value="123456">
        </div>

        <div class="input-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" class="input-field" placeholder="Confirm your password" value="123456">
        </div>

        <button class="btn-create" onclick="handleSignup()">Create Account</button>

        <div class="login-link">
          Already have an account? 
          <a href="login.html">Log in</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function handleSignup() {
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!firstName || !lastName || !email) {
        alert("Please fill in all required fields");
        return;
      }

      if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return;
      }

      if (password.length < 6) {
        alert("Password should be at least 6 characters long");
        return;
      }

      // Success message
      alert(`🎉 Account Created Successfully!\n\nWelcome to Sphere, ${firstName}!`);

      // Redirect to feed page after signup
      setTimeout(() => {
        window.location.href = "feed.html";
      }, 1000);
    }

    // Allow pressing Enter to submit
    document.addEventListener("keypress", function(e) {
      if (e.key === "Enter") handleSignup();
    });
  </script>
</body>
</html>
